<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B6914"/>
      <stop offset="35%"  stop-color="#E8C95A"/>
      <stop offset="65%"  stop-color="#F5DFA0"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7A5C10" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#D4AA3C"/>
      <stop offset="70%"  stop-color="#D4AA3C"/>
      <stop offset="100%" stop-color="#7A5C10" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0F1F3D" rx="48"/>

  <!-- === GOLD ARCS (bowl shape, opening upward) === -->
  <!-- Arc center: (250, 208), each arc from upper-left to upper-right curving through bottom -->

  <!-- Outer arc  r=110 -->
  <path d="M 148,168 A 110,110 0 0,1 352,168"
        fill="none" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Middle arc  r=85 -->
  <path d="M 173,180 A 85,85 0 0,1 327,180"
        fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" opacity="0.82"/>

  <!-- Inner arc  r=62 -->
  <path d="M 197,191 A 62,62 0 0,1 303,191"
        fill="none" stroke="url(#gold2)" stroke-width="2.2" stroke-linecap="round" opacity="0.65"/>

  <!-- === BLUE ARROW === -->
  <!-- Shaft from arc-center area upward-right -->
  <line x1="253" y1="216" x2="325" y2="112"
        stroke="url(#arrowGrad)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Arrowhead (tip at 333,99, pointing ~−54°) -->
  <polygon points="15,0 -6,-9 -6,9"
           fill="#60A5FA"
           transform="translate(333,99) rotate(-54)"/>

  <!-- === TEXT === -->
  <text
    x="250" y="365"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-weight="900"
    font-size="74"
    fill="white"
    text-anchor="middle"
    letter-spacing="6"
  >LIDERS</text>

  <!-- Tagline -->
  <text
    x="250" y="406"
    font-family="Arial,sans-serif"
    font-size="14.5"
    fill="#8FB3D9"
    text-anchor="middle"
    letter-spacing="6"
  >LEAD · CLOSE · WIN</text>
</svg>
