<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Background -->
  <rect width="400" height="200" fill="#0F1F3D" rx="16"/>

  <!-- Top arc (above text) -->
  <path d="M 60 100 A 140 80 0 0 1 340 100" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 75 100 A 125 65 0 0 1 325 100" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- LIDERS text -->
  <text
    x="200"
    y="115"
    font-family="'Heebo', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="64"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
  >LIDERS</text>

  <!-- Arrow line extending from L base under full word -->
  <line x1="55" y1="128" x2="333" y2="128" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="345,128 330,121 330,135" fill="#2563EB"/>

  <!-- Bottom arc (below arrow) -->
  <path d="M 60 100 A 140 80 0 0 0 340 100" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 75 100 A 125 65 0 0 0 325 100" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="200"
    y="168"
    font-family="'Heebo', 'Arial', sans-serif"
    font-weight="400"
    font-size="13"
    fill="#8FB3D9"
    text-anchor="middle"
    letter-spacing="5"
  >LEAD · CLOSE · WIN</text>
</svg>
