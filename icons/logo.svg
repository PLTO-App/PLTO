  <line x1="193" y1="18" x2="190" y2="27" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="193" y1="18" x2="184" y2="21" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="171,40 179,37 175,31" fill="rgba(255,255,255,0.88)"/>
