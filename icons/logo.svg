        font-size="68" fill="rgba(255,255,255,0.95)" letter-spacing="-2">PLT</text>
  <!-- O — outer ring: frosted glass -->
  <circle cx="171" cy="40" r="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.38)" stroke-width="9"/>
