<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="PLTO">
  <!-- PLT text -->
  <text x="4" y="62" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700"
        font-size="68" fill="rgba(255,255,255,0.95)" letter-spacing="-2">PLT</text>
  <!-- O — outer ring: frosted glass, sized to match text -->
